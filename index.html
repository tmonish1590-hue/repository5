<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Arcade Snake Game</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #11141a;
            color: #00ff66;
            text-align: center;
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
        }
        h1 {
            margin: 0 0 8px 0;
            letter-spacing: 4px;
            font-size: 1.8rem;
        }
        .scoreboard {
            display: flex;
            gap: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .lives-container { color: #ff3333; }
        #game-board {
            background-color: #05080c;
            border: 3px solid #00ff66;
            max-width: 100%;
            touch-action: none;
        }
        .overlay-text {
            margin-top: 8px;
            font-size: 0.95rem;
            min-height: 22px;
        }
        .game-over-msg {
            color: #ff3333;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .dpad {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(3, 56px);
            grid-template-rows: repeat(3, 56px);
            gap: 6px;
        }
        .dpad-btn {
            background: #1a1f2a;
            border: 2px solid #00ff66;
            border-radius: 8px;
            color: #00ff66;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.1s;
        }
        .dpad-btn:active { background: #00ff66; color: #11141a; }
        .dpad-center {
            background: #1a1f2a;
            border: 2px solid #444;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            color: #444;
            letter-spacing: 1px;
        }
        .dpad-empty { visibility: hidden; }
    </style>
</head>
<body>

    <h1>SNAKE ARCADE</h1>

    <div class="scoreboard">
        <div>SCORE: <span id="score">0</span></div>
        <div class="lives-container">LIVES: <span id="lives">❤️❤️❤️</span></div>
    </div>

    <canvas id="game-board" width="360" height="360"></canvas>

    <div id="message" class="overlay-text">Tap D-pad or press arrow key to begin!</div>

    <div class="dpad">
        <div class="dpad-empty"></div>
        <button class="dpad-btn" id="btn-up"    aria-label="Up">▲</button>
        <div class="dpad-empty"></div>

        <button class="dpad-btn" id="btn-left"  aria-label="Left">◀</button>
        <div class="dpad-center">D<br>PAD</div>
        <button class="dpad-btn" id="btn-right" aria-label="Right">▶</button>

        <div class="dpad-empty"></div>
        <button class="dpad-btn" id="btn-down"  aria-label="Down">▼</button>
        <div class="dpad-empty"></div>
    </div>

    <script>
        const canvas = document.getElementById("game-board");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const livesElement = document.getElementById("lives");
        const messageElement = document.getElementById("message");

        const gridSize = 18;
        const tileCount = Math.floor(canvas.width / gridSize);

        let score = 0, lives = 3, isGameOver = false;
        let snake = [], velocityX = 0, velocityY = 0;
        let foodX = 0, foodY = 0, flashFrameCount = 0;
        let touchStartX = 0, touchStartY = 0;

        function initGame() {
            const mid = Math.floor(tileCount / 2);
            snake = [{x:mid,y:mid},{x:mid,y:mid+1},{x:mid,y:mid+2}];
            velocityX = 0; velocityY = 0; flashFrameCount = 0;
            generateFood();
            updateLivesDisplay();
        }

        function generateFood() {
            do {
                foodX = Math.floor(Math.random() * tileCount);
                foodY = Math.floor(Math.random() * tileCount);
            } while (snake.some(p => p.x === foodX && p.y === foodY));
        }

        function updateLivesDisplay() {
            livesElement.textContent = lives > 0 ? "❤️".repeat(lives) : "NONE";
        }

        function move(dir) {
            if (isGameOver) { resetFullGame(); return; }
            if (velocityX === 0 && velocityY === 0)
                messageElement.textContent = "Don't hit walls or yourself!";
            if (dir === "up"    && velocityY !== 1)  { velocityX = 0;  velocityY = -1; }
            if (dir === "down"  && velocityY !== -1) { velocityX = 0;  velocityY = 1;  }
            if (dir === "left"  && velocityX !== 1)  { velocityX = -1; velocityY = 0;  }
            if (dir === "right" && velocityX !== -1) { velocityX = 1;  velocityY = 0;  }
        }

        function bindBtn(id, dir) {
            const btn = document.getElementById(id);
            btn.addEventListener("touchstart", e => { move(dir); e.preventDefault(); }, { passive: false });
            btn.addEventListener("mousedown", () => move(dir));
        }
        bindBtn("btn-up",    "up");
        bindBtn("btn-down",  "down");
        bindBtn("btn-left",  "left");
        bindBtn("btn-right", "right");

        canvas.addEventListener("touchstart", e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener("touchend", e => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
            Math.abs(dx) > Math.abs(dy) ? move(dx > 0 ? "right" : "left") : move(dy > 0 ? "down" : "up");
            e.preventDefault();
        }, { passive: false });

        window.addEventListener("keydown", e => {
            if (isGameOver) { if (e.code === "Space") resetFullGame(); return; }
            const map = { ArrowUp:"up", ArrowDown:"down", ArrowLeft:"left", ArrowRight:"right" };
            if (map[e.key]) move(map[e.key]);
        });

        function updateFrame() {
            if (isGameOver) return;
            if (velocityX !== 0 || velocityY !== 0) {
                const nx = snake[0].x + velocityX;
                const ny = snake[0].y + velocityY;
                if (nx < 0 || nx >= tileCount || ny < 0 || ny >= tileCount ||
                    snake.some(p => p.x === nx && p.y === ny)) {
                    handleLifeLoss(); return;
                }
                snake.unshift({ x: nx, y: ny });
                if (nx === foodX && ny === foodY) {
                    score += 10;
                    scoreElement.textContent = score;
                    generateFood();
                } else {
                    snake.pop();
                }
            }
            drawFrame();
        }

        function drawFrame() {
            ctx.save();
            ctx.fillStyle = flashFrameCount > 0 ? "#3a0000" : "#05080c";
            if (flashFrameCount > 0) flashFrameCount--;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "rgba(0,255,102,0.05)";
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath(); ctx.moveTo(i*gridSize, 0); ctx.lineTo(i*gridSize, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i*gridSize); ctx.lineTo(canvas.width, i*gridSize); ctx.stroke();
            }

            ctx.fillStyle = "#ff4444";
            ctx.fillRect(foodX*gridSize+3, foodY*gridSize+3, gridSize-6, gridSize-6);

            snake.forEach((p, i) => {
                ctx.fillStyle = i === 0 ? "#00ff66" : "#009944";
                ctx.fillRect(p.x*gridSize+1, p.y*gridSize+1, gridSize-2, gridSize-2);
            });

            ctx.restore();
        }

        function handleLifeLoss() {
            lives--;
            flashFrameCount = 4;
            updateLivesDisplay();
            if (lives > 0) {
                messageElement.textContent = "Ouch! Tap D-pad to keep going.";
                const mid = Math.floor(tileCount / 2);
                snake = [{x:mid,y:mid},{x:mid,y:mid+1},{x:mid,y:mid+2}];
                velocityX = 0; velocityY = 0;
            } else {
                triggerGameOver();
            }
        }

        function triggerGameOver() {
            isGameOver = true;
            messageElement.innerHTML = '<span class="game-over-msg">GAME OVER</span> — Tap any button to restart';
            drawFrame();
        }

        function resetFullGame() {
            score = 0; lives = 3; isGameOver = false;
            scoreElement.textContent = 0;
            messageElement.textContent = "Tap D-pad or press arrow key to begin!";
            initGame();
        }

        initGame();
        drawFrame();
        setInterval(updateFrame, 110);
    </script>
</body>
</html>
